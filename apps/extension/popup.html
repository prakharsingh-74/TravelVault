<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      background-color: #0c0c0e;
      color: #fafafa;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      items-center: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #27272a;
      padding-bottom: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 11px;
      color: white;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
    }
    .subtitle {
      font-size: 9px;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #a1a1aa;
      margin-bottom: 6px;
      font-weight: 500;
    }
    select {
      width: 100%;
      background-color: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 8px 10px;
      color: white;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    select:focus {
      border-color: #8b5cf6;
    }
    button {
      width: 100%;
      background: linear-gradient(90deg, #8b5cf6, #3b82f6);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.15);
      transition: opacity 0.2s ease;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      font-size: 11px;
      text-align: center;
      color: #a1a1aa;
      margin-top: 12px;
    }
    .status.success {
      color: #34d399;
    }
    .status.error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">TV</div>
    <div>
      <h2 class="title">TravelVault</h2>
      <span class="subtitle">Autofill Assistant</span>
    </div>
  </div>

  <div class="form-group">
    <label for="passengerSelect">Select Passenger Profile</label>
    <select id="passengerSelect">
      <option value="">Loading profiles...</option>
    </select>
  </div>

  <button id="autofillBtn" disabled>Autofill Form</button>

  <div id="statusMsg" class="status">Connecting to local vault...</div>

  <script src="popup.js"></script>
</body>
</html>
